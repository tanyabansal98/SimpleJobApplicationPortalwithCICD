trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'tanyajobportalacr'
  acrLoginServer: 'tanyajobportalacr.azurecr.io'
  imageName: 'job-portal-backend'
  containerAppName: 'placeholder-app'
  resourceGroup: 'rg-job-portal'

stages:
  # ─────────────────────────────────────────────────
  # Stage 1: Build the WAR and push the Docker image
  # ─────────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Push Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Maven Build + Docker Build + Push to ACR'
        steps:

          # Step 1: Compile and package the Spring Boot WAR
          - task: Maven@4
            displayName: 'Maven — Build WAR (skip tests)'
            inputs:
              mavenPomFile: 'backend/pom.xml'
              goals: 'clean package'
              options: '-DskipTests=true'
              publishJUnitResults: false

          # Step 2: Build the Docker image
          # --platform linux/amd64 ensures the image runs correctly on Azure Container Apps
          - task: Docker@2
            displayName: 'Docker — Build Image (linux/amd64)'
            inputs:
              containerRegistry: 'ACRServiceConnection'
              repository: '$(imageName)'
              command: 'build'
              Dockerfile: 'backend/Dockerfile'
              buildContext: 'backend'
              arguments: '--platform linux/amd64'
              tags: |
                $(Build.BuildId)
                latest

          # Step 3: Push the image to Azure Container Registry
          - task: Docker@2
            displayName: 'Docker — Push Image to ACR'
            inputs:
              containerRegistry: 'ACRServiceConnection'
              repository: '$(imageName)'
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest

  # ─────────────────────────────────────────────────
  # Stage 2: Deploy new revision to Azure Container Apps
  # ─────────────────────────────────────────────────
  - stage: DeployStaging
    displayName: 'Deploy to Azure Container Apps'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAzure
        displayName: 'Update Container App with new image'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Azure CLI — Deploy new revision'
                  inputs:
                    azureSubscription: 'AzureServiceConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Install/upgrade the Container Apps CLI extension
                      az extension add --name containerapp --upgrade --yes

                      echo "Deploying image: $(acrLoginServer)/$(imageName):$(Build.BuildId)"

                      # Update the container app with the new image tag
                      az containerapp update \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --image $(acrLoginServer)/$(imageName):$(Build.BuildId) \
                        --revision-suffix build-$(Build.BuildId)

                      echo "Deployment complete. New revision: $(containerAppName)--build-$(Build.BuildId)"

  # ─────────────────────────────────────────────────
  # Stage 3: Send 100% traffic to the new revision
  # ─────────────────────────────────────────────────
  - stage: DeployProduction
    displayName: 'Activate New Revision (100% Traffic)'
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - deployment: ActivateRevision
        displayName: 'Route all traffic to new revision'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Azure CLI — Set 100% traffic to new revision'
                  inputs:
                    azureSubscription: 'AzureServiceConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az extension add --name containerapp --upgrade --yes

                      az containerapp ingress traffic set \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --revision-weight \
                          $(containerAppName)--build-$(Build.BuildId)=100

                      echo "Production traffic switched to build $(Build.BuildId)"
