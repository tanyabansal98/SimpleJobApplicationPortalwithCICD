# ===============================
# ORACLE DB
# ===============================
# These are read from environment variables at runtime.
# The value after the colon (:) is the default — used when no env var is set (e.g. local docker-compose).
# In Azure Container Apps, you inject SPRING_DATASOURCE_URL etc. as env vars to override these.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle-db:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:SYSTEM}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:OraclePassword123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===============================
# SQL INIT (SEED DATA)
# ===============================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ===============================
# HIBERNATE
# ===============================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# REDIS / SESSION
# ===============================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.session.store-type=redis
