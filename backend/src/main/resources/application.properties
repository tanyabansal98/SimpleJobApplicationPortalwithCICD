spring.application.name=job-application-portal

# ===============================
# PROFILES
# ===============================
spring.profiles.active=docker

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# JSP VIEW RESOLVER
# ===============================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ===============================
# JACKSON
# ===============================
spring.jackson.default-property-inclusion=non_null


# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# In Docker/Azure the container's working dir is /app, so uploads go there
# Override by setting UPLOAD_DIR env var in Azure Container Apps
app.upload.dir=${UPLOAD_DIR:/app/uploads/resumes}
